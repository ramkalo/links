<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects</title>
  <script>
    (function() {
      var v = Date.now();
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'styles.css?v=' + v;
      document.head.appendChild(link);

      // async = false keeps them running in order, so labyrinth.js can count on
      // map.js having already defined the map and the links.
      ['map.js', 'labyrinth.js'].forEach(function(src) {
        var script = document.createElement('script');
        script.src = src + '?v=' + v;
        script.async = false;
        document.head.appendChild(script);
      });
    })();
  </script>
</head>
<body>

  <!-- The whole site. labyrinth.js builds everything inside this and opens it
       on load; there is no other page to be on. -->
  <div id="labyrinth" class="labyrinth"></div>

</body>
</html>
