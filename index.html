<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects</title>
  <script>
    (function() {
      var v = Date.now();
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'styles.css?v=' + v;
      document.head.appendChild(link);

      // async = false keeps them running in order, so labyrinth.js can count on
      // script.js having already defined the link data.
      ['script.js', 'labyrinth.js'].forEach(function(src) {
        var script = document.createElement('script');
        script.src = src + '?v=' + v;
        script.async = false;
        document.head.appendChild(script);
      });
    })();
  </script>
</head>
<body>
  <header class="header">
    <div class="header-identity">
      <!-- Change profile.jpg to match whatever you name your photo file (also works with .png, .webp, etc.) -->
      <img src="profile.jpg" alt="Ram Kalo" class="profile-pic">
      <h1 id="page-title">My Projects</h1>
    </div>
    <p id="page-description" class="description"></p>
  </header>

  <main id="categories" class="categories">
  </main>

  <footer class="footer" id="page-footer">
    <p><a href="https://github.com/ramkalo/Linkinator" target="_blank" rel="noopener noreferrer">build your own site like this</a> &lt;- visit this link and follow the "README" section </p>
    <button type="button" id="labyrinth-toggle" class="labyrinth-toggle">enter the labyrinth</button>
  </footer>

  <div id="labyrinth" class="labyrinth" hidden></div>

</body>
</html>
